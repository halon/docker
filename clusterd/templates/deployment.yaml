{{- if .Values.global.clusterd.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clusterd.fullname" . }}
  labels:
    {{- include "clusterd.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "clusterd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "clusterd.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clusterd.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: cluster
              containerPort: {{ .Values.global.clusterd.service.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: {{ .Values.global.clusterd.service.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/halon
            - name: tls-ca-crt
              mountPath: /etc/halon/tls/ca-crt
            - name: tls-controlsocket-server
              mountPath: /etc/halon/tls/controlsocket-server
            - name: tls-smtpd-controlsocket-client-crt
              mountPath: /etc/halon/tls/smtpd-controlsocket-client-crt
      volumes:
        - name: config
          configMap:
            name: {{ include "clusterd.fullname" . }}
        - name: tls-ca-crt
          configMap:
            name: halon-tls-ca-crt
        - name: tls-controlsocket-server
          secret:
            secretName: {{ include "clusterd.fullname" . }}-tls-controlsocket-server
        - name: tls-smtpd-controlsocket-client-crt
          configMap:
            name: halon-smtpd-tls-controlsocket-client-crt
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}